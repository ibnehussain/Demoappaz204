name: CI test

on:
  push: 
    branches: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Azhar Restore
        run: dotnet restore
        
      - name: Azhar Build
        run: dotnet build

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: demo.zip
          path: publish_output #temp value
          

  deploy:
    runs-on: ubuntu-latest
    needs: build

    
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8.0.0
        with:
          name: demo.zip
       
      - name: Azure login
        uses: Azure/login@v2.3.0
        with:
          creds: ${{secrets.AZURE_CRED}}

      - name: Azure Azhar WebApp
        uses: Azure/webapps-deploy@v3.0.7
        with:
          app-name: weekendappdemo012455858
          package: demo.zip #temp value
 
        
        





    
